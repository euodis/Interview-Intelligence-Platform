version: '3.8'

services:
  web:
    image: node:20
    container_name: ii_platform_web
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3001:3001"
      - "5555:5555"
    env_file:
      - .env.local
    command: npm run dev
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ii_platform?schema=public
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: ii_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ii_platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
